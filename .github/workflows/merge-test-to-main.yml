name: PR Readiness Check (test→main)

on:
  pull_request:
    branches: [ main ]
    types: [ opened, reopened, synchronize, review_requested ]

jobs:
  readiness-check:
    runs-on: ubuntu-latest
    if: github.head_ref == 'test'
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
    - uses: actions/checkout@v3

    - name: Check PR details
      run: |
        echo "PR Head Ref: ${{ github.head_ref }}"
        echo "PR Base Ref: ${{ github.base_ref }}"
        echo "PR Number: ${{ github.event.pull_request.number }}"

    - name: Check approval status
      uses: actions/github-script@v6
      id: approval
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;
          const { data: reviews } = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number,
          });

          const approvals = reviews.filter(r => r.state === 'APPROVED').length;
          const changes = reviews.filter(r => r.state === 'CHANGES_REQUESTED').length;

          console.log(`Approvals: ${approvals}, Changes Requested: ${changes}`);
          core.setOutput('has_approval', approvals > 0);
          core.setOutput('has_changes', changes > 0);

    - name: Get check runs status
      uses: actions/github-script@v6
      id: checks
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;
          const { data: checkRuns } = await github.rest.checks.listForRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: pr.head.sha,
          });

          const passed = checkRuns.check_runs.filter(c => c.conclusion === 'success').length;
          const failed = checkRuns.check_runs.filter(c => c.conclusion === 'failure').length;

          console.log(`Checks Passed: ${passed}, Failed: ${failed}`);
          checkRuns.check_runs.forEach(c => {
            console.log(`  ${c.name}: ${c.conclusion}`);
          });

          core.setOutput('all_passed', failed === 0 && passed > 0);

    - name: Post readiness status
      if: always()
      uses: actions/github-script@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;
          const approval = '${{ steps.approval.outputs.has_approval }}';
          const hasChanges = '${{ steps.approval.outputs.has_changes }}';
          const checks = '${{ steps.checks.outputs.all_passed }}';

          let message = '';
          if (approval === 'true' && hasChanges === 'false' && checks === 'true') {
            message = '✅ All conditions met:\n- ✓ Approved\n- ✓ No changes requested\n- ✓ All checks passed\n\n**This PR is ready for manual merge.**';
          } else {
            const pending = [];
            if (approval !== 'true') pending.push('- ⏳ Awaiting approval');
            if (hasChanges === 'true') pending.push('- ❌ Changes requested — must be resolved');
            if (checks !== 'true') pending.push('- ⏳ Awaiting all checks to pass');
            message = '⏳ Not ready to merge:\n' + pending.join('\n');
          }

          try {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: message,
            });
          } catch (error) {
            console.log('Could not post comment');
          }
