name: Unfreeze LLM Model

# Runs every 3 days to check the frozen state of the LLM and propose unfreezing
# if the system memory error (dolphin-mixtral OOM) has been addressed.
# When frozen=true in config/llm-state.json, LLM endpoints return 503 instead of OOMing.
on:
  schedule:
    - cron: '0 0 */3 * *'   # Midnight UTC every 3 days
  workflow_dispatch:         # Allow manual trigger from the Actions tab

jobs:
  check-and-unfreeze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Check LLM frozen state
        id: check
        run: |
          FROZEN=$(node -e "
            const fs = require('fs');
            try {
              const cfg = JSON.parse(fs.readFileSync('./config/llm-state.json', 'utf8'));
              console.log(cfg.frozen === true ? 'true' : 'false');
            } catch (e) {
              console.log('false');
            }
          ")
          echo "frozen=$FROZEN" >> "$GITHUB_OUTPUT"
          echo "LLM frozen state: $FROZEN"

      - name: Unfreeze LLM config
        if: steps.check.outputs.frozen == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('./config/llm-state.json', 'utf8'));
            cfg.frozen = false;
            cfg.unfrozenAt = new Date().toISOString();
            // Schedule next review in 3 days
            const next = new Date();
            next.setDate(next.getDate() + 3);
            cfg.nextUnfreezeCheck = next.toISOString();
            fs.writeFileSync('./config/llm-state.json', JSON.stringify(cfg, null, 2) + '\n');
            console.log('LLM state updated: frozen=false, model=' + cfg.model);
          "

      - name: Create unfreeze pull request
        if: steps.check.outputs.frozen == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(llm): unfreeze LLM model processing (scheduled 3-day check)"
          title: "🔓 Unfreeze LLM: Re-enable ${{ github.sha && 'phi3:mini' || 'phi3:mini' }} model processing"
          body: |
            ## 🔓 Scheduled LLM Unfreeze

            This PR was automatically generated by the 3-day unfreeze schedule.

            ### What changed
            - `config/llm-state.json`: set `frozen: false`
            - Default model remains **phi3:mini** (~2.2 GiB — fits comfortably within available RAM)

            ### Background
            The LLM was frozen because `dolphin-mixtral` required **24.8 GiB** but only **24.1 GiB**
            was available, causing an out-of-memory crash. The fix switched the default model to
            `phi3:mini` and added a frozen state so processing can be safely re-enabled once
            confirmed stable.

            ### To use a different model
            Set `OLLAMA_MODEL=<model>` in your `.env` file. See `.env.example` for lightweight options.

            ### Merge when ready
            Review the change and merge to re-enable LLM processing. The model can always be
            re-frozen by setting `LLM_FROZEN=true` in `.env` or by updating `config/llm-state.json`.
          branch: "fix/unfreeze-llm-${{ github.run_number }}"
          base: main
          labels: "llm,automated,unfreeze"

      - name: Report already unfrozen
        if: steps.check.outputs.frozen == 'false'
        run: |
          echo "✅ LLM is already unfrozen — no action needed."
          echo "Current model: $(node -e "const c=require('./config/llm-state.json'); console.log(c.model)")"
