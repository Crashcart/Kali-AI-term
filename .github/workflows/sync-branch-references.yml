name: Sync Branch References

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'install.sh'
      - 'uninstall.sh'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update test→main references
        run: |
          echo "🔄 Syncing branch references from test to main..."
          sed -i 's|/test/|/main/|g' README.md install.sh uninstall.sh
          echo "✅ Update complete"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✓ No changes needed"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Changes detected - preparing pull request"
            echo "--- Changes:"
            git diff --color=never
          fi

      - name: Create branch and commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="chore/sync-branch-refs-$(date +%Y%m%d-%H%M%S)"
          echo "SYNC_BRANCH=$BRANCH" >> $GITHUB_ENV
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add README.md install.sh uninstall.sh
          git commit -m "chore: sync branch references to main

- Updated all test -> main references in docs and scripts
- This PR is automatically generated and requires human review"
          git push origin "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_BRANCH: ${{ env.SYNC_BRANCH }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = process.env.SYNC_BRANCH;
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: auto-sync branch references to main',
              body: '## Automated Branch Reference Sync\n\nThis PR was automatically generated to update `test \u2192 main` references in docs and scripts.\n\n**\u26a0\ufe0f Human review required before merging.**\n\n### Files changed\n- `README.md`\n- `install.sh`\n- `uninstall.sh`',
              head: branch,
              base: 'main',
            });
            console.log(`✅ PR created: ${pr.html_url}`);

      - name: Workflow Summary
        if: always()
        run: |
          echo "📋 Sync Workflow Summary"
          echo "========================"
          echo "Status: ${{ job.status }}"
          echo "Branch: main"
          echo "Action: Auto-sync branch references via PR (no direct push)"
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "Result: ✅ PR opened for human review"
          else
            echo "Result: ℹ️ No changes needed"
          fi
