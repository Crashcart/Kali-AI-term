version: '3.8'

services:
  app:
    build: .
    container_name: kali-hacker-bot
    ports:
      - "31337:3000"
    environment:
      - NODE_ENV=production
      - OLLAMA_URL=http://host.docker.internal:11434
      - KALI_CONTAINER=kali-linux
      - LOG_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    depends_on:
      - kali
    networks:
      - pentest-net
    restart: unless-stopped

  kali:
    image: kalilinux/kali-rolling:latest
    container_name: kali-linux
    stdin_open: true
    tty: true
    networks:
      - pentest-net
    command: /bin/bash
    restart: unless-stopped

networks:
  pentest-net:
    driver: bridge
