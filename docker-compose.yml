services:
  app:
    build: .
    container_name: kali-ai-term-app
    ports:
      - "0.0.0.0:31337:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BIND_HOST=0.0.0.0
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
      - LLM_FROZEN=${LLM_FROZEN:-false}
      - KALI_CONTAINER=kali-ai-term-kali
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-kalibot}
      - AUTH_SECRET=${AUTH_SECRET:-changeme-local-dev}
      - LOG_LEVEL=info
    volumes:
      - type: bind
        source: "${DOCKER_SOCKET:-/var/run/docker.sock}"
        target: /var/run/docker.sock
        bind:
          propagation: private
      - type: bind
        source: ./data
        target: /app/data
    depends_on:
      - kali
    networks:
      - kali-ai-term-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  kali:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: kali-ai-term-kali
    stdin_open: true
    tty: true
    networks:
      - kali-ai-term-net
    command: /bin/bash
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  kali-ai-term-net:
    driver: bridge
